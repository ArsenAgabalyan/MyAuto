<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Вход — MyAuto</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
<div class="page">
    <div class="auth-logo">
        <h1><span>MY</span>AUTO</h1>
        <p>Войдите в свой аккаунт</p>
    </div>
    <div class="card card-pad">
        <div th:if="${param.error}" style="background:#fee2e2;border:1px solid #fca5a5;color:#dc2626;border-radius:7px;padding:10px 14px;font-size:13px;margin-bottom:16px">
            ❌ Неверный логин или пароль
        </div>
        <div th:if="${param.logout}" style="background:#d1fae5;border:1px solid #6ee7b7;color:#065f46;border-radius:7px;padding:10px 14px;font-size:13px;margin-bottom:16px">
            ✓ Вы вышли из системы
        </div>
        <form th:action="@{/auth/login}" method="post">
            <div class="field">
                <label>Логин</label>
                <input type="text" name="username" placeholder="Введите логин" required autofocus>
            </div>
            <div class="field">
                <label>Пароль</label>
                <input type="password" name="password" placeholder="Введите пароль" required>
            </div>
            <button type="submit" class="btn btn-red" style="width:100%;padding:10px">Войти</button>
        </form>
        <a href="/auth/register" class="auth-link">Нет аккаунта? Зарегистрироваться</a>
    </div>
</div>
</body>
</html>
