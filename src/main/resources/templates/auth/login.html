<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Вход — MyAuto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center vh-100">
<div class="container" style="max-width: 400px;">
    <div class="text-center mb-4">
        <h2 class="fw-bold">🚗 MYAUTO</h2>
        <p class="text-muted">Форма входа</p>
    </div>
    <div class="card p-4 shadow-sm">
        <form th:action="@{/auth/login}" method="post">
            <div class="mb-3">
                <label class="form-label">Логин:</label>
                <input type="text" name="username" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Пароль:</label>
                <input type="password" name="password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 fw-bold">Войти</button>
        </form>
        <div class="text-center mt-3">
            <a href="/auth/register" class="text-decoration-none">Нет аккаунта? Зарегистрироваться</a>
        </div>
    </div>
</div>
</body>
</html>
