<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация — MyAuto</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<div class="page">
    <div class="auth-logo">
        <h1><span>MY</span>AUTO</h1>
        <p>Создайте аккаунт</p>
    </div>
    <div class="card card-pad">
        <div th:if="${param.error}" style="background:#fee2e2;border:1px solid #fca5a5;color:#dc2626;border-radius:7px;padding:10px 14px;font-size:13px;margin-bottom:16px">
            ❌ Пользователь с таким логином уже существует
        </div>
        <form th:action="@{/auth/register}" th:object="${user}" method="post">
            <div class="field">
                <label>Логин</label>
                <input type="text" th:field="*{username}" placeholder="Придумайте логин" required autofocus>
            </div>
            <div class="field">
                <label>Пароль</label>
                <input type="password" th:field="*{password}" placeholder="Придумайте пароль" required>
            </div>
            <button type="submit" class="btn btn-red" style="width:100%;padding:10px">Зарегистрироваться</button>
        </form>
        <a href="/auth/login" class="auth-link">Уже есть аккаунт? Войти</a>
    </div>
</div>
</body>
</html>
