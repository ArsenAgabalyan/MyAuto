<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Регистрация — MyAuto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center vh-100">
<div class="container" style="max-width: 400px;">
    <div class="text-center mb-4">
        <h2 class="fw-bold text-success">🚗 MYAUTO</h2>
        <p class="text-muted">Форма регистрации</p>
    </div>
    <div class="card p-4 shadow-sm border-success">
        <form th:action="@{/auth/register}" th:object="${user}" method="post">
            <div class="mb-3">
                <label class="form-label">Придумайте логин:</label>
                <input type="text" th:field="*{username}" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Придумайте пароль:</label>
                <input type="password" th:field="*{password}" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-success w-100 fw-bold">Зарегистрироваться</button>
        </form>
        <div class="text-center mt-3">
            <a href="/auth/login" class="text-decoration-none text-success">Уже есть аккаунт? Войти</a>
        </div>
    </div>
</div>
</body>
</html>
