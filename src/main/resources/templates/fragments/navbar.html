        let currentLang = localStorage.getItem('ma_lang') || 'ru';
        
        function setLang(l) {
            currentLang = l;
            localStorage.setItem('ma_lang', l);
            if (typeof applyLang === 'function') {
                if (typeof lang !== 'undefined') {
                    lang = l;
                }
                applyLang();
            } else {
                applyNavbarLang();
            }
        }
        
        function applyNavbarLang() {
            const t = T_GLOBAL[currentLang] || T_GLOBAL.ru;
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.dataset.i18n;
                if (t[key] !== undefined) el.textContent = t[key];
            });
            document.querySelectorAll('[data-i18n-ph]').forEach(el => {
                const key = el.dataset.i18nPh;
                if (t[key] !== undefined) el.placeholder = t[key];
            });
            document.querySelectorAll('.nav .lang-btn').forEach(b => {
                b.classList.toggle('active', b.dataset.lang === currentLang);
            });
        }
        
        function updateNavbarUnreadCount() {
            const badge = document.getElementById('navUnreadBadge');
            if (!badge) return;
            fetch('/api/chat/unread-count')
                .then(res => { if (!res.ok) throw new Error(); return res.json(); })
                .then(data => {
                    if (data.count > 0) {
                        badge.textContent = data.count;
                        badge.style.display = 'inline-flex';
                    } else {
                        badge.style.display = 'none';
                    }
                })
                .catch(() => {});
        }

        function handleSellCar() {
            const modal = document.getElementById('addModal');
            if (modal) {
                openModal('addModal');
            } else {
                window.location.href = '/listings/add';
            }
        }

        function handleLogin() {
            const modal = document.getElementById('loginModal');
            if (modal) {
                openModal('loginModal');
            } else {
                window.location.href = '/auth/login';
            }
        }

        function handleRegister() {
            const modal = document.getElementById('registerModal');
            if (modal) {
                openModal('registerModal');
            } else {
                window.location.href = '/auth/register';
            }
        }

        // Initialize navbar
        applyNavbarLang();
        updateNavbarUnreadCount();
        setInterval(updateNavbarUnreadCount, 10000);
        
        // Storage change listener to keep tabs/modals in sync
        window.addEventListener('storage', (e) => {
            if (e.key === 'ma_lang') {
                const newLang = e.newValue || 'ru';
                currentLang = newLang;
                if (typeof applyLang === 'function') {
                    if (typeof lang !== 'undefined') {
                        lang = newLang;
                    }
                    applyLang();
                } else {
                    applyNavbarLang();
                }
            }
        });
