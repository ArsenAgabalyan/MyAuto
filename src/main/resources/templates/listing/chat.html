<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="'Чат — ' + ${listing.title}">Чат</title>
    <link rel="stylesheet" href="/style.css">
    <style>
        .chat-wrap { max-width: 720px; margin: 32px auto; padding: 0 16px; }
        .chat-header { background: var(--dark); color: #fff; padding: 14px 18px; border-radius: 8px 8px 0 0; display: flex; justify-content: space-between; align-items: center; }
        .chat-header strong { font-size: 15px; }
        .chat-header span { font-size: 12px; color: #fbbf24; }
        .chat-box { height: 420px; overflow-y: auto; background: #f8f9fa; border: 1px solid var(--border); border-top: none; padding: 14px; display: flex; flex-direction: column; gap: 10px; }
        .row-mine { display: flex; justify-content: flex-end; }
        .row-other { display: flex; justify-content: flex-start; }
        .bubble { max-width: 70%; padding: 8px 14px; border-radius: 18px; font-size: 14px; word-break: break-word; }
        .bubble-mine { background: var(--red); color: #fff; border-bottom-right-radius: 3px; }
        .bubble-other { background: #e9ecef; color: #212529; border-bottom-left-radius: 3px; }
        .meta { font-size: 11px; color: #aaa; margin-top: 2px; }
        .meta-r { text-align: right; }
        .chat-input { border: 1px solid var(--border); border-top: none; border-radius: 0 0 8px 8px; background: #fff; padding: 12px; display: flex; gap: 8px; }
        .chat-input input { flex: 1; border-radius: 20px; padding: 9px 16px; }
        .chat-input button { border-radius: 20px; white-space: nowrap; }
        .back-link { display: inline-flex; align-items: center; gap: 6px; font-size: 13px; color: var(--gray); text-decoration: none; margin-bottom: 14px; }
        .back-link:hover { color: var(--red); }
    </style>
</head>
<body>
<nav class="nav">
    <a class="nav-brand" href="/"><span>MY</span>AUTO</a>
</nav>
<div class="chat-wrap">
    <a th:href="@{/listings/{id}(id=${listing.id})}" class="back-link">← К объявлению</a>
    <div class="chat-header">
        <strong th:text="${listing.title}"></strong>
        <span th:text="'Продавец: ' + ${listing.user.username}"></span>
    </div>
    <div class="chat-box" id="chatBox">
        <div th:if="${#lists.isEmpty(messages)}" style="text-align:center;color:#aaa;margin:auto">Сообщений пока нет</div>
        <div th:each="msg : ${messages}">
            <div th:if="${msg.sender.username == #authentication.name}">
                <div class="row-mine"><div class="bubble bubble-mine" th:text="${msg.content}"></div></div>
                <div class="meta meta-r" th:text="${#temporals.format(msg.sentAt,'HH:mm · dd.MM.yyyy')}"></div>
            </div>
            <div th:if="${msg.sender.username != #authentication.name}">
                <div class="meta" th:text="${msg.sender.username}"></div>
                <div class="row-other"><div class="bubble bubble-other" th:text="${msg.content}"></div></div>
                <div class="meta" th:text="${#temporals.format(msg.sentAt,'HH:mm · dd.MM.yyyy')}"></div>
            </div>
        </div>
    </div>
    <div class="chat-input">
        <input id="msgInput" type="text" placeholder="Введите сообщение..." maxlength="1000" autocomplete="off">
        <button id="sendBtn" class="btn btn-red">Отправить</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
<script th:inline="javascript">
    const listingId = /*[[${listing.id}]]*/ 0;
    const me = /*[[${#authentication.name}]]*/ '';
    const box = document.getElementById('chatBox');
    const inp = document.getElementById('msgInput');
    box.scrollTop = box.scrollHeight;

    const stomp = Stomp.over(new SockJS('/ws'));
    stomp.debug = null;
    stomp.connect({}, () => {
        stomp.subscribe('/topic/chat/' + listingId, frame => {
            const d = JSON.parse(frame.body);
            addMsg(d.sender, d.content, d.sender === me, d.sentAt);
        });
    });

    function addMsg(sender, content, mine, rawTime) {
        let t = '';
        try { const d = new Date(rawTime); t = d.toTimeString().slice(0,5) + ' · ' + d.toLocaleDateString('ru'); } catch(e){}
        const w = document.createElement('div');
        w.innerHTML = mine
            ? `<div class="row-mine"><div class="bubble bubble-mine">${esc(content)}</div></div><div class="meta meta-r">${t}</div>`
            : `<div class="meta">${esc(sender)}</div><div class="row-other"><div class="bubble bubble-other">${esc(content)}</div></div><div class="meta">${t}</div>`;
        box.appendChild(w);
        box.scrollTop = box.scrollHeight;
    }

    function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    function send() {
        const v = inp.value.trim();
        if (!v || !stomp.connected) return;
        stomp.send('/app/chat/' + listingId, {}, JSON.stringify({content: v}));
        inp.value = '';
    }

    document.getElementById('sendBtn').addEventListener('click', send);
    inp.addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); send(); } });
</script>
</body>
</html>
