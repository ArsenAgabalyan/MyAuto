<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Редактировать — MyAuto</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>

<nav class="nav">
    <a class="nav-brand" href="/"><span>MY</span>AUTO</a>
    <a th:href="${isAdmin ? '/admin/moderation' : '/profile'}" class="btn btn-outline btn-sm">← Назад</a>
</nav>

<div class="page" style="max-width:580px;margin-top:40px">
    <p class="page-title">Редактирование объявления</p>
    <div class="card card-pad">
        <form th:action="@{/listings/edit/{id}(id=${listing.id})}" th:object="${listing}" method="post">
            <div class="field">
                <label>Заголовок</label>
                <input type="text" th:field="*{title}" required>
            </div>
            <div class="row2">
                <div class="field">
                    <label>Модель</label>
                    <input type="text" th:field="*{carModel}" required>
                </div>
                <div class="field">
                    <label>Год выпуска</label>
                    <input type="number" th:field="*{year}" required>
                </div>
            </div>
            <div class="row2">
                <div class="field">
                    <label>Цена ($)</label>
                    <input type="number" step="0.01" th:field="*{price}" required>
                </div>
                <div class="field">
                    <label>Телефон для связи</label>
                    <input type="text" th:field="*{contactPhone}" required>
                </div>
            </div>
            <div class="field">
                <label>Описание</label>
                <textarea th:field="*{description}" rows="4" required></textarea>
            </div>

            <p th:if="${!isAdmin}" style="font-size: 12px; color: var(--red); margin-bottom: 15px;">
                * После сохранения объявление снова отправится на модерацию.
            </p>

            <div style="display:flex;gap:10px;">
                <button type="submit" class="btn btn-red" style="flex:1">Сохранить изменения</button>
            </div>
        </form>
    </div>
</div>

</body>
</html>
