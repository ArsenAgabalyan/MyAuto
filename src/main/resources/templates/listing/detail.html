<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title th:text="${car.title}">Детали объявления</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-5">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">🚗 MYAUTO</a>
        <a href="/" class="btn btn-outline-light btn-sm">Назад к списку</a>
    </div>
</nav>

<div class="container">
    <div class="row g-5">
        <div class="col-lg-7">
            <div id="carDetailCarousel" class="carousel slide shadow rounded overflow-hidden bg-black" data-bs-ride="false">
                <div class="carousel-inner" style="height: 450px;">
                    <div th:if="${#lists.isEmpty(car.images)}" class="carousel-item active h-100">
                        <img src="https://via.placeholder.com/600x400?text=No+Photo" class="d-block w-100 h-100" style="object-fit: contain;" alt="Нет фото">
                    </div>
                    <div th:if="${!#lists.isEmpty(car.images)}" th:each="img, iterStat : ${car.images}"
                         th:classappend="${iterStat.index == 0} ? 'active'" class="carousel-item h-100">
                        <img th:src="${img}" class="d-block w-100 h-100" style="object-fit: contain;" alt="Фото автомобиля">
                    </div>
                </div>
                <button th:if="${#lists.size(car.images) > 1}" class="carousel-control-prev" type="button" data-bs-target="#carDetailCarousel" data-bs-slide="prev">
                    <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                    <span class="visually-hidden">Назад</span>
                </button>
                <button th:if="${#lists.size(car.images) > 1}" class="carousel-control-next" type="button" data-bs-target="#carDetailCarousel" data-bs-slide="next">
                    <span class="carousel-control-next-icon" aria-hidden="true"></span>
                    <span class="visually-hidden">Вперед</span>
                </button>
            </div>
        </div>

        <div class="col-lg-5">
            <div class="card p-4 shadow-sm border-0 mb-4">
                <h1 class="fw-bold mb-2" th:text="${car.title}">Заголовок</h1>
                <h2 class="text-success fw-bold mb-4" th:text="${car.price} + ' $'">Цена</h2>

                <table class="table my-3">
                    <tr>
                        <td class="text-muted text-start">Модель автомобиля:</td>
                        <td class="fw-bold text-end" th:text="${car.carModel}">Модель</td>
                    </tr>
                    <tr>
                        <td class="text-muted text-start">Год выпуска:</td>
                        <td class="fw-bold text-end" th:text="${car.year}">Год</td>
                    </tr>
                    <tr>
                        <td class="text-muted text-start">Дата размещения:</td>
                        <td class="fw-bold text-end" th:text="${#temporals.format(car.createdAt, 'dd.MM.yyyy HH:mm')}">Дата</td>
                    </tr>
                </table>
            </div>

            <div class="card p-4 shadow-sm border-0 bg-dark text-white">
                <h4 class="mb-3 fw-bold text-warning">📞 Контакты продавца</h4>
                <div class="mb-2">
                    <span class="text-muted">Продавец:</span>
                    <strong class="ms-1 text-light fs-5" th:text="${car.user.username}">User</strong>
                </div>
                <div>
                    <span class="text-muted">Телефон:</span>
                    <div class="fs-4 fw-bold text-warning mt-1" th:text="${car.contactPhone}">+7 XXX XXX XX XX</div>
                </div>
                <a th:href="'tel:' + ${car.contactPhone}" class="btn btn-warning w-100 fw-bold mt-3">Позвонить продавцу</a>

                <!-- Кнопка чата: только для авторизованных пользователей, не являющихся продавцом -->
                <a th:if="${#authentication.name != 'anonymousUser' and #authentication.name != car.user.username}"
                   th:href="@{/chat/{id}(id=${car.id})}"
                   class="btn btn-primary w-100 fw-bold mt-2">💬 Написать продавцу</a>
            </div>
        </div>
    </div>

    <div class="row mt-5">
        <div class="col-12">
            <div class="card p-4 shadow-sm border-0">
                <h3 class="fw-bold border-bottom pb-3 mb-3">Описание автомобиля</h3>
                <p class="fs-5 text-secondary" style="white-space: pre-line;" th:text="${car.description}">
                    Подробное описание от владельца...
                </p>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
