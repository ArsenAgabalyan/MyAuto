<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title th:text="${car.title}">Объявление</title>
    <link rel="stylesheet" href="/style.css">
    <style>
        .detail-grid { display: grid; grid-template-columns: 1fr 380px; gap: 24px; align-items: start; }
        .gallery { border-radius: 10px; overflow: hidden; background: #000; }
        .gallery img { width: 100%; height: 380px; object-fit: contain; display: block; }
        .thumbs { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
        .thumbs img { width: 80px; height: 56px; object-fit: cover; border-radius: 6px; cursor: pointer; border: 2px solid transparent; transition: border-color 0.15s; }
        .thumbs img.active { border-color: var(--red); }
        .info-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
        .info-row:last-child { border-bottom: none; }
        .info-row span:first-child { color: var(--gray); }
        .info-row span:last-child { font-weight: 600; }
        .seller-card { background: var(--dark); color: #fff; border-radius: var(--radius); padding: 20px; }
        .seller-card h4 { font-size: 15px; color: #fbbf24; margin-bottom: 14px; }
        .seller-phone { font-size: 22px; font-weight: 700; color: #fbbf24; margin: 6px 0 14px; }
        @media(max-width:760px) { .detail-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
<nav class="nav">
    <a class="nav-brand" href="/"><span>MY</span>AUTO</a>
    <a href="/" class="btn btn-outline btn-sm">← К списку</a>
</nav>

<div class="page-wide" style="margin-top:32px">
    <div class="detail-grid">

        <!-- Галерея -->
        <div>
            <div class="gallery">
                <img id="mainImg"
                     th:src="${#lists.isEmpty(car.images)} ? 'https://via.placeholder.com/600x380/e5e7eb/9ca3af?text=Нет+фото' : ${car.images[0]}"
                     alt="Фото">
            </div>
            <div class="thumbs" th:if="${!#lists.isEmpty(car.images)}">
                <img th:each="img,i : ${car.images}" th:src="${img}" th:classappend="${i.index==0}?'active':''"
                     onclick="setMain(this)" alt="">
            </div>
            <!-- Описание -->
            <div class="card card-pad" style="margin-top:20px">
                <p style="font-size:15px;font-weight:700;margin-bottom:10px">Описание</p>
                <p style="font-size:14px;color:#444;line-height:1.7;white-space:pre-line" th:text="${car.description}"></p>
            </div>
        </div>

        <!-- Правая колонка -->
        <div>
            <div class="card card-pad" style="margin-bottom:16px">
                <h1 style="font-size:18px;font-weight:700;margin-bottom:8px" th:text="${car.title}"></h1>
                <p class="price" style="font-size:26px;margin-bottom:16px" th:text="${car.price} + ' $'"></p>
                <div class="info-row"><span>Модель</span><span th:text="${car.carModel}"></span></div>
                <div class="info-row"><span>Год</span><span th:text="${car.year}"></span></div>
                <div class="info-row"><span>Дата</span><span th:text="${#temporals.format(car.createdAt,'dd.MM.yyyy')}"></span></div>
                <div class="info-row"><span>Продавец</span><span th:text="${car.user.username}"></span></div>
            </div>

            <div class="seller-card">
                <h4>📞 Контакты продавца</h4>
                <div style="font-size:13px;color:#aaa">Телефон:</div>
                <div class="seller-phone" th:text="${car.contactPhone}"></div>
                <a th:href="'tel:' + ${car.contactPhone}" class="btn btn-warn" style="width:100%;text-align:center;margin-bottom:8px">Позвонить</a>
                <a th:if="${#authentication.name != 'anonymousUser' and #authentication.name != car.user.username}"
                   th:href="@{/chat/{id}(id=${car.id})}"
                   class="btn btn-red" style="width:100%;text-align:center">💬 Написать продавцу</a>
            </div>
        </div>
    </div>
</div>

<script>
    function setMain(el) {
        document.getElementById('mainImg').src = el.src;
        document.querySelectorAll('.thumbs img').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
    }
</script>
</body>
</html>
