<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec=\"http://www.thymeleaf.org/extras/spring-security\">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${car.title}">Объявление</title>
    <link rel="stylesheet" href="/style.css">

</head>
<body>

<nav class="nav">
    <a class="nav-brand" href="/"><span>MY</span>AUTO</a>
    <a href="/" class="btn btn-outline btn-sm">← На главную</a>
</nav>

<div class="container">
    <div class="detail-grid">

        <div>
            <div class="gallery-box">
                <div class="gallery">
                    <img id="mainImg" th:src="${!#lists.isEmpty(car.images) ? car.images[0] : '/images/no-photo.jpg'}" alt="Car photo">
                </div>
                <div class="thumbs" th:if="${#lists.size(car.images) > 1}">
                    <img th:each="img, iter : ${car.images}"
                         th:src="${img}"
                         th:class="${iter.index == 0} ? 'active' : ''"
                         onclick="changeImage(this)">
                </div>
            </div>

            <div class="desc-box">
                <h4>Описание от владельца</h4>
                <p th:text="${car.description}">Текст описания...</p>
            </div>
        </div>

        <div>
            <div class="info-box">
                <div>
                    <div class="price-tag" th:text="${#numbers.formatDecimal(car.price, 0, 'WHITESPACE', 0, 'POINT')} + ' $'">0 $</div>
                    <h1 class="car-title-text" th:text="${car.title}">Марка Модель Авто</h1>
                </div>

                <table class="tech-table">
                    <tr>
                        <td class="lbl">Модель</td>
                        <td class="val" th:text="${car.carModel}">Модель</td>
                    </tr>
                    <tr>
                        <td class="lbl">Год выпуска</td>
                        <td class="val" th:text="${car.year}">2020</td>
                    </tr>
                    <tr>
                        <td class="lbl">Продавец</td>
                        <td class="val" th:text="${car.user.username}">user</td>
                    </tr>
                </table>

                <div style="background: #fff1f2; border: 1px solid #ffe4e6; padding: 12px 16px; border-radius: 8px; margin-top: 4px;">
                    <span style="font-size:12px;color:#9f1239;display:block;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:2px">Телефон продавца</span>
                    <a th:href="'tel:' + ${car.contactPhone}" style="font-size:18px;font-weight:700;color:#e31e24;text-decoration:none;" th:text="${car.contactPhone}">+374 XX XX XX</a>
                </div>

                <a th:href="@{/chat/initiate/{id}(id=${car.id})}" class="btn btn-red btn-lg" style="width:100%;text-align:center;margin-top:8px">💬 Написать продавцу</a>
            </div>
        </div>

    </div>
</div>

<div class="chat-widget" sec:authorize="isAuthenticated()">
    <button class="widget-btn" onclick="toggleWidget()">
        <span>💬 Мои сообщения</span>
    </button>
    <div class="widget-popup" id="chatPopup">
        <div class="widget-header">Активные диалоги</div>
        <div class="widget-list" id="widgetList">
            <div style="text-align:center;color:#94a3b8;padding:20px 0;font-size:13px;">Загрузка...</div>
        </div>
        <div style="padding:8px 12px;border-top:1px solid #e2e8f0;background:#f1f5f9;text-align:center;">
            <a href="/chats" style="font-size:12px;color:var(--red);font-weight:700;text-decoration:none;">Открыть все диалоги</a>
        </div>
    </div>
</div>

<script>
    function changeImage(thumb) {
        document.getElementById('mainImg').src = thumb.src;
        document.querySelectorAll('.thumbs img').forEach(img => img.classList.remove('active'));
        thumb.classList.add('active');
    }

    function toggleWidget() {
        const popup = document.getElementById('chatPopup');
        if (popup.style.display === 'flex') {
            popup.style.display = 'none';
        } else {
            popup.style.display = 'flex';
            loadWidgetChats();
        }
    }

    function loadWidgetChats() {
        const list = document.getElementById('widgetList');
        fetch('/api/chat/my-chats-summary')
            .then(r => { if (!r.ok) throw new Error(); return r.json(); })
            .then(rooms => {
                list.innerHTML = '';
                if (!rooms.length) {
                    list.innerHTML = '<div style="text-align:center;color:#94a3b8;padding:40px 10px;font-size:14px;">У вас пока нет активных диалогов</div>';
                    return;
                }
                rooms.forEach(item => {
                    const a = document.createElement('a');
                    a.href = '/chat/' + item.id + '?buyer=' + encodeURIComponent(item.buyer);
                    a.style.cssText = 'display:block;background:white;padding:12px;border-radius:8px;border:1px solid #e2e8f0;text-decoration:none;color:#1e293b;transition:border-color 0.2s;';
                    a.onmouseover = () => a.style.borderColor = '#e31e24';
                    a.onmouseout  = () => a.style.borderColor = '#e2e8f0';
                    a.innerHTML = `<div style="font-weight:700;font-size:14px;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${item.title}</div><div style="font-size:12px;color:#64748b;">Собеседник: <span style="color:#e31e24;font-weight:600;">${item.interlocutor}</span></div>`;
                    list.appendChild(a);
                });
            })
            .catch(() => {
                list.innerHTML = '<div style="text-align:center;color:#ef4444;padding:20px 0;font-size:13px;">Ошибка загрузки</div>';
            });
    }
</script>

</body>
</html>
