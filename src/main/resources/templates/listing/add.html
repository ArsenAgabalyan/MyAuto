<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Добавить объявление</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container my-5" style="max-width: 600px;">
    <h2 class="mb-4 text-center">Продать автомобиль</h2>

    <form th:action="@{/listings/add}" th:object="${listing}" method="post" class="card p-4 shadow-sm">
        <div class="mb-3">
            <label class="form-label">Заголовок объявления:</label>
            <input type="text" th:field="*{title}" class="form-control" placeholder="Например: Audi A4 B7 в отличном состоянии" required>
        </div>
        <div class="row">
            <div class="col mb-3">
                <label class="form-label">Модель:</label>
                <input type="text" th:field="*{carModel}" class="form-control" placeholder="A4 B7" required>
            </div>
            <div class="col mb-3">
                <label class="form-label">Год выпуска:</label>
                <input type="number" th:field="*{year}" class="form-control" placeholder="2006" required>
            </div>
        </div>
        <div class="mb-3">
            <label class="form-label">Цена ($):</label>
            <input type="number" step="0.01" th:field="*{price}" class="form-control" placeholder="7500" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Описание:</label>
            <textarea th:field="*{description}" class="form-control" rows="4" placeholder="Опишите состояние машины, комплектацию..." required></textarea>
        </div>
        <div class="d-flex justify-content-between">
            <a href="/" class="btn btn-secondary">Отмена</a>
            <button type="submit" class="btn btn-success">Отправить на модерацию</button>
        </div>
    </form>
</div>
</body>
</html>
