<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Продать авто — MyAuto</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
<nav class="nav">
    <a class="nav-brand" href="/"><span>MY</span>AUTO</a>
    <a href="/" class="btn btn-outline btn-sm">← Назад</a>
</nav>
<div class="page" style="max-width:580px;margin-top:40px">
    <p class="page-title">Новое объявление</p>
    <div class="card card-pad">
        <form th:action="@{/listings/add}" th:object="${listing}" method="post" enctype="multipart/form-data">
            <div class="field">
                <label>Заголовок</label>
                <input type="text" th:field="*{title}" placeholder="Например: Toyota Camry 2020 в отличном состоянии" required>
            </div>
            <div class="row2">
                <div class="field">
                    <label>Модель</label>
                    <input type="text" th:field="*{carModel}" placeholder="Camry V70" required>
                </div>
                <div class="field">
                    <label>Год выпуска</label>
                    <input type="number" th:field="*{year}" placeholder="2020" required>
                </div>
            </div>
            <div class="row2">
                <div class="field">
                    <label>Цена ($)</label>
                    <input type="number" step="0.01" th:field="*{price}" placeholder="18500" required>
                </div>
                <div class="field">
                    <label>Телефон для связи</label>
                    <input type="text" th:field="*{contactPhone}" placeholder="+374 XX XXX XXX" required>
                </div>
            </div>
            <div class="field">
                <label>Описание</label>
                <textarea th:field="*{description}" rows="4" placeholder="Состояние, пробег, комплектация..." required></textarea>
            </div>
            <div class="field">
                <label>Фотографии</label>
                <input type="file" name="imageFiles" multiple accept="image/*" style="background:#fff;padding:7px">
            </div>
            <div style="display:flex;gap:10px;margin-top:4px">
                <a href="/" class="btn btn-ghost" style="flex:1;text-align:center">Отмена</a>
                <button type="submit" class="btn btn-red" style="flex:2">Отправить на модерацию</button>
            </div>
        </form>
    </div>
</div>
</body>
</html>
