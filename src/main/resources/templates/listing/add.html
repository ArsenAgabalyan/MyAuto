<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Продать авто — MyAuto</title>
    <link rel="stylesheet" href="/style.css">
    <style>
        /* Wizard Stepper header */
        .wizard-stepper {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 30px;
            background: #f8fafc;
            padding: 16px 24px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }
        .step-indicator {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            opacity: 0.4;
            transition: var(--transition);
        }
        .step-indicator.active {
            opacity: 1;
        }
        .step-indicator.completed {
            opacity: 0.85;
        }
        .step-num {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: var(--gray);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 700;
            transition: var(--transition);
        }
        .step-indicator.active .step-num {
            background: var(--red);
            box-shadow: 0 0 0 4px rgba(220, 38, 38, 0.15);
        }
        .step-indicator.completed .step-num {
            background: #16a34a;
        }
        .step-label {
            font-size: 12px;
            font-weight: 700;
            color: var(--dark);
        }
        .step-line {
            flex: 1;
            height: 2px;
            background: var(--border);
            margin: 0 16px;
            margin-bottom: 20px;
        }
        
        /* Wizard Steps */
        .wizard-step {
            display: none;
        }
        .wizard-step.active {
            display: block;
        }
        
        /* Custom Upload Box */
        .file-upload-box {
            border: 2px dashed #cbd5e1;
            border-radius: 12px;
            padding: 36px 20px;
            text-align: center;
            cursor: pointer;
            background: #f8fafc;
            transition: var(--transition);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        .file-upload-box:hover, .file-upload-box.dragover {
            border-color: var(--red);
            background: #fff5f5;
        }
        .upload-icon {
            font-size: 32px;
        }
        .upload-text {
            font-size: 13px;
            font-weight: 600;
            color: #64748b;
        }
        
        /* Image Preview Wrapper */
        .image-preview-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 12px;
            margin-top: 16px;
        }
        .preview-img-wrapper {
            position: relative;
            aspect-ratio: 1;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid var(--border);
        }
        .preview-img-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .remove-preview-btn {
            position: absolute;
            top: 4px;
            right: 4px;
            background: rgba(15, 23, 42, 0.7);
            color: white;
            border: none;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            font-size: 11px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(2px);
        }
        
        /* Simulated Progress Bar */
        .progress-bar-container {
            margin-top: 20px;
            background: #f1f5f9;
            border-radius: 8px;
            padding: 12px;
            border: 1px solid var(--border);
        }
        .progress-bar-label {
            font-size: 12px;
            font-weight: 700;
            color: var(--dark);
            margin-bottom: 6px;
            display: flex;
            justify-content: space-between;
        }
        .progress-bar-track {
            width: 100%;
            height: 8px;
            background: #e2e8f0;
            border-radius: 4px;
            overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%;
            width: 0;
            background: var(--red);
            border-radius: 4px;
            transition: width 0.15s ease;
        }
        
        /* Specs card checklist */
        .specs-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 24px;
        }
        .spec-card {
            border: 1.5px solid var(--border);
            background: #f8fafc;
            border-radius: var(--radius);
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: var(--transition);
            user-select: none;
        }
        .spec-card:hover {
            border-color: #cbd5e1;
            background: #f1f5f9;
        }
        .spec-card-check {
            width: 20px;
            height: 20px;
            border-radius: 6px;
            border: 1.5px solid #cbd5e1;
            background: white;
            color: transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: bold;
            transition: var(--transition);
        }
        .spec-card input:checked + .spec-card-check {
            background: var(--red);
            border-color: var(--red);
            color: white;
            box-shadow: 0 2px 6px rgba(220, 38, 38, 0.25);
        }
        .spec-card input:checked ~ .spec-card-label {
            color: var(--dark);
            font-weight: 700;
        }
        .spec-card-label {
            font-size: 13px;
            font-weight: 600;
            color: #64748b;
            transition: var(--transition);
        }
        
        /* Nav buttons layout */
        .wizard-nav-buttons {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }
        
        @media (max-width: 500px) {
            .specs-grid {
                grid-template-columns: 1fr;
            }
            .wizard-stepper {
                padding: 12px;
            }
            .step-line {
                margin: 0 8px;
                margin-bottom: 20px;
            }
        }
    </style>
</head>
<body>

<nav class="nav">
    <a class="nav-brand" href="/"><span>MY</span>AUTO</a>
    <a href="/" class="btn btn-outline btn-sm">← Назад</a>
</nav>

<div class="page" style="max-width:580px;margin-top:10px">
    <p class="page-title">Новое объявление</p>
    <div class="card card-pad">
        
        <!-- Stepper Indicator Header -->
        <div class="wizard-stepper">
            <div class="step-indicator active" id="stepIndicator1">
                <div class="step-num">1</div>
                <div class="step-label">Инфо</div>
            </div>
            <div class="step-line"></div>
            <div class="step-indicator" id="stepIndicator2">
                <div class="step-num">2</div>
                <div class="step-label">Фото</div>
            </div>
            <div class="step-line"></div>
            <div class="step-indicator" id="stepIndicator3">
                <div class="step-num">3</div>
                <div class="step-label">Характеристики</div>
            </div>
        </div>

        <form th:action="@{/listings/add}" th:object="${listing}" method="post" enctype="multipart/form-data" id="wizardForm">
            
            <!-- STEP 1: GENERAL INFO -->
            <div class="wizard-step active" id="step1">
                <div class="field">
                    <label>Заголовок</label>
                    <input type="text" th:field="*{title}" placeholder="Например: Toyota Camry 2020 в отличном состоянии" required autocomplete="off">
                </div>
                <div class="row2">
                    <div class="field">
                        <label>Модель</label>
                        <input type="text" th:field="*{carModel}" placeholder="Camry V70" required autocomplete="off">
                    </div>
                    <div class="field">
                        <label>Год выпуска</label>
                        <input type="number" th:field="*{year}" placeholder="2020" required autocomplete="off">
                    </div>
                </div>
                <div class="row2">
                    <div class="field">
                        <label>Цена ($)</label>
                        <input type="number" step="0.01" th:field="*{price}" placeholder="18500" required autocomplete="off">
                    </div>
                    <div class="field">
                        <label>Телефон для связи</label>
                        <input type="text" th:field="*{contactPhone}" placeholder="+374 XX XXX XXX" required autocomplete="off">
                    </div>
                </div>
                <div class="field">
                    <label>Описание</label>
                    <textarea th:field="*{description}" rows="4" placeholder="Состояние, пробег, комплектация..." required></textarea>
                </div>
                <div class="wizard-nav-buttons">
                    <a href="/" class="btn btn-ghost" style="flex:1;text-align:center">Отмена</a>
                    <button type="button" class="btn btn-red" id="step1NextBtn" onclick="nextStep()" style="flex:2" disabled>Далее</button>
                </div>
            </div>

            <!-- STEP 2: PHOTOS UPLOAD -->
            <div class="wizard-step" id="step2">
                <div class="field">
                    <label>Фотографии автомобиля</label>
                    <div class="file-upload-box" id="dropZone">
                        <span class="upload-icon">📁</span>
                        <span class="upload-text">Перетащите фотографии сюда или нажмите для выбора</span>
                        <input type="file" id="imageFilesInput" name="imageFiles" multiple accept="image/*" style="display:none">
                    </div>
                    
                    <div id="imagePreviewContainer" class="image-preview-container"></div>
                    
                    <!-- Progress Bar -->
                    <div class="progress-bar-container" id="progressBarContainer" style="display:none">
                        <div class="progress-bar-label">
                            <span>Загрузка и оптимизация...</span>
                            <span id="progressPercent">0%</span>
                        </div>
                        <div class="progress-bar-track">
                            <div class="progress-bar-fill" id="progressBarFill"></div>
                        </div>
                    </div>
                </div>
                <div class="wizard-nav-buttons">
                    <button type="button" class="btn btn-ghost" onclick="prevStep()" style="flex:1">← Назад</button>
                    <button type="button" class="btn btn-red" id="step2NextBtn" onclick="nextStep()" style="flex:2">Далее</button>
                </div>
            </div>

            <!-- STEP 3: OPTIONS CHECKBOX CARDS -->
            <div class="wizard-step" id="step3">
                <label style="margin-bottom:14px;display:block">Выберите характеристики вашего авто:</label>
                <div class="specs-grid">
                    <label class="spec-card">
                        <input type="checkbox" th:field="*{notBeaten}" style="display:none">
                        <span class="spec-card-check">✓</span>
                        <span class="spec-card-label">Не бита</span>
                    </label>
                    <label class="spec-card">
                        <input type="checkbox" th:field="*{notPainted}" style="display:none">
                        <span class="spec-card-check">✓</span>
                        <span class="spec-card-label">Не крашена</span>
                    </label>
                    <label class="spec-card">
                        <input type="checkbox" th:field="*{owner}" style="display:none">
                        <span class="spec-card-check">✓</span>
                        <span class="spec-card-label">Я собственник</span>
                    </label>
                    <label class="spec-card">
                        <input type="checkbox" th:field="*{serviceBook}" style="display:none">
                        <span class="spec-card-check">✓</span>
                        <span class="spec-card-label">Сервисная книжка</span>
                    </label>
                </div>
                <div class="wizard-nav-buttons">
                    <button type="button" class="btn btn-ghost" onclick="prevStep()" style="flex:1">← Назад</button>
                    <button type="submit" class="btn btn-red" style="flex:2">Отправить на модерацию</button>
                </div>
            </div>

        </form>
    </div>
</div>

<script>
    // ── NAVIGATION CONTROLLER ──
    let currentStep = 1;

    function showStep(stepNum) {
        document.querySelectorAll('.wizard-step').forEach(step => step.classList.remove('active'));
        document.getElementById('step' + stepNum).classList.add('active');
        
        // Update indicators
        document.querySelectorAll('.step-indicator').forEach((ind, index) => {
            const stepIdx = index + 1;
            ind.classList.remove('active', 'completed');
            if (stepIdx === stepNum) {
                ind.classList.add('active');
            } else if (stepIdx < stepNum) {
                ind.classList.add('completed');
            }
        });
        
        currentStep = stepNum;
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function nextStep() {
        if (currentStep === 1) {
            showStep(2);
        } else if (currentStep === 2) {
            showStep(3);
        }
    }

    // ── STEP 1: REAL-TIME VALIDATION ──
    const step1Inputs = [
        document.getElementById('title'),
        document.getElementById('carModel'),
        document.getElementById('year'),
        document.getElementById('price'),
        document.getElementById('contactPhone'),
        document.getElementById('description')
    ];

    function validateStep1() {
        const allValid = step1Inputs.every(input => {
            if (!input) return false;
            if (input.type === 'number') {
                return input.value !== '';
            }
            return input.value.trim().length > 0;
        });

        const nextBtn = document.getElementById('step1NextBtn');
        if (allValid) {
            nextBtn.removeAttribute('disabled');
        } else {
            nextBtn.setAttribute('disabled', 'true');
        }
    }

    step1Inputs.forEach(input => {
        if (input) {
            input.addEventListener('input', validateStep1);
            input.addEventListener('change', validateStep1);
        }
    });

    // Run initial validation check (in case browser auto-fills fields)
    setTimeout(validateStep1, 200);

    // ── STEP 2: MULTI-PHOTO UPLOAD WITH PROGRESS ──
    const imageInput = document.getElementById('imageFilesInput');
    const previewContainer = document.getElementById('imagePreviewContainer');
    const dropZone = document.getElementById('dropZone');

    dropZone.addEventListener('click', () => imageInput.click());

    imageInput.addEventListener('change', handleFilesSelect);

    dropZone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropZone.classList.add('dragover');
    });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.classList.remove('dragover');
        if (e.dataTransfer.files.length > 0) {
            imageInput.files = e.dataTransfer.files;
            handleFilesSelect();
        }
    });

    function handleFilesSelect() {
        previewContainer.innerHTML = '';
        const files = Array.from(imageInput.files);
        if (files.length === 0) {
            document.getElementById('progressBarContainer').style.display = 'none';
            return;
        }

        // Show thumbnails
        files.forEach((file, index) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'preview-img-wrapper';
                wrapper.innerHTML = `
                    <img src="${e.target.result}" alt="Preview">
                    <button type="button" class="remove-preview-btn" onclick="removeFile(event, ${index})">×</button>
                `;
                previewContainer.appendChild(wrapper);
            };
            reader.readAsDataURL(file);
        });

        // Simulate progress bar upload
        const container = document.getElementById('progressBarContainer');
        const fill = document.getElementById('progressBarFill');
        const percent = document.getElementById('progressPercent');
        const nextBtn = document.getElementById('step2NextBtn');

        nextBtn.setAttribute('disabled', 'true');
        container.style.display = 'block';
        fill.style.width = '0%';
        percent.textContent = '0%';

        let progress = 0;
        const interval = setInterval(() => {
            progress += Math.floor(Math.random() * 15) + 5;
            if (progress >= 100) {
                progress = 100;
                clearInterval(interval);
                nextBtn.removeAttribute('disabled');
            }
            fill.style.width = progress + '%';
            percent.textContent = progress + '%';
        }, 100);
    }

    window.removeFile = function(e, idx) {
        e.stopPropagation(); // Prevent clicking preview from opening file explorer
        const dt = new DataTransfer();
        const files = imageInput.files;
        for (let i = 0; i < files.length; i++) {
            if (i !== idx) dt.items.add(files[i]);
        }
        imageInput.files = dt.files;
        handleFilesSelect();
    };
</script>
</body>
</html>
