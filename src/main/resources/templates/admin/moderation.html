<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Модерация и управление — MyAuto</title>
    <link rel="stylesheet" href="/style.css">
    <style>
        .status-tag {
            font-size: 11px;
            font-weight: 800;
            padding: 3px 8px;
            border-radius: 12px;
            text-transform: uppercase;
        }
        .tag-pending { background: #fef3c7; color: #92400e; border: 1px solid #fcd34d; }
        .tag-approved { background: #d1fae5; color: #065f46; border: 1px solid #6ee7b7; }
    </style>
</head>
<body>

<nav class="nav">
    <a class="nav-brand" href="/"><span>MY</span>AUTO</a>
    <div class="nav-links">
        <a href="/" class="btn btn-outline btn-sm">На главную</a>
    </div>
</nav>

<div class="page-wide">
    <p class="page-title">🔍 Ожидают проверки (Модерация)</p>

    <div th:if="${#lists.isEmpty(pendingCars)}" class="alert-ok" style="margin-bottom: 30px;">
        🎉 Новых заявок на модерацию нет.
    </div>

    <div class="card tbl-wrap" th:if="${!#lists.isEmpty(pendingCars)}" style="margin-bottom: 50px;">
        <table>
            <thead>
            <tr>
                <th>Фото</th>
                <th>Заголовок</th>
                <th>Продавец</th>
                <th>Цена</th>
                <th>Действия</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="car : ${pendingCars}">
                <td>
                    <img th:if="${!#lists.isEmpty(car.images)}" th:src="${car.images[0]}"
                         style="width:70px;height:50px;object-fit:cover;border-radius:5px" alt="">
                </td>
                <td>
                    <div style="font-weight:600" th:text="${car.title}"></div>
                    <div class="tag" th:text="${car.carModel} + ' (' + ${car.year} + ')'"></div>
                </td>
                <td th:text="${car.user.username}"></td>
                <td class="price" th:text="${car.price} + ' $'"></td>
                <td>
                    <div style="display:flex; gap:6px">
                        <form th:action="@{/admin/listings/{id}/approve(id=${car.id})}" method="post">
                            <button class="btn btn-ok btn-sm">Одобрить</button>
                        </form>
                        <a th:href="@{/listings/edit/{id}(id=${car.id})}" class="btn btn-ghost btn-sm">Правка</a>
                        <form th:action="@{/admin/listings/{id}/reject(id=${car.id})}" method="post" onsubmit="return confirm('Удалить объявление?')">
                            <button class="btn btn-del btn-sm">Удалить</button>
                        </form>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <p class="page-title">🚗 Все опубликованные объявления</p>

    <div class="card tbl-wrap">
        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>Заголовок</th>
                <th>Продавец</th>
                <th>Цена</th>
                <th>Статус</th>
                <th>Управление</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="car : ${approvedCars}">
                <td class="tag" th:text="${car.id}"></td>
                <td>
                    <div style="font-weight:600" th:text="${car.title}"></div>
                    <div class="tag" th:text="${car.carModel}"></div>
                </td>
                <td th:text="${car.user.username}"></td>
                <td class="price" th:text="${car.price} + ' $'"></td>
                <td><span class="status-tag tag-approved">Активно</span></td>
                <td>
                    <div style="display:flex; gap:6px">
                        <a th:href="@{/listings/edit/{id}(id=${car.id})}" class="btn btn-ghost btn-sm">Редактировать</a>
                        <form th:action="@{/admin/listings/{id}/reject(id=${car.id})}" method="post" onsubmit="return confirm('Удалить объявление навсегда?')">
                            <button class="btn btn-del btn-sm">Удалить</button>
                        </form>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
