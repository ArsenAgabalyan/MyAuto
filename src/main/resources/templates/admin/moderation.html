<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Модерация — MyAuto</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>

<nav class="nav">
    <a class="nav-brand" href="/"><span>MY</span>AUTO</a>
    <a href="/" class="btn btn-outline btn-sm">На главную</a>
</nav>

<div class="page-wide">
    <p class="page-title">Модерация объявлений</p>

    <div th:if="${#lists.isEmpty(pendingCars)}" class="alert-ok">
        🎉 Нет объявлений для проверки.
    </div>

    <div class="card tbl-wrap" th:if="${!#lists.isEmpty(pendingCars)}">
        <table>
            <thead>
            <tr>
                <th>Фото</th><th>Заголовок</th><th>Модель / Год</th>
                <th>Цена</th><th>Описание</th><th>Продавец</th><th>Действия</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="car : ${pendingCars}">
                <td>
                    <img th:if="${!#lists.isEmpty(car.images)}" th:src="${car.images[0]}"
                         style="width:70px;height:50px;object-fit:cover;border-radius:5px" alt="">
                    <span th:if="${#lists.isEmpty(car.images)}" class="tag">Нет фото</span>
                </td>
                <td style="font-weight:600" th:text="${car.title}"></td>
                <td><span th:text="${car.carModel}"></span> <span class="tag" th:text="'('+${car.year}+')'"></span></td>
                <td class="price" th:text="${car.price}+' $'"></td>
                <td style="max-width:180px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#555"
                    th:text="${car.description}"></td>
                <td th:text="${car.user.username}"></td>
                <td>
                    <div style="display:flex;gap:6px">
                        <form th:action="@{/admin/listings/{id}/approve(id=${car.id})}" method="post">
                            <button class="btn btn-ok btn-sm">Одобрить</button>
                        </form>
                        <form th:action="@{/admin/listings/{id}/reject(id=${car.id})}" method="post">
                            <button class="btn btn-del btn-sm">Удалить</button>
                        </form>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
