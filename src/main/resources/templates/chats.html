<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мои диалоги</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <style>
        :root {
            --primary-red: #dc3545;
            --hover-red: #b02a37;
            --light-bg: #f8f9fa;
        }

        body {
            background-color: var(--light-bg);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        .page-header {
            border-bottom: 2px solid var(--primary-red);
            padding-bottom: 10px;
            color: #212529;
        }

        /* Карточка диалога */
        .chat-card {
            background: #ffffff;
            border-radius: 12px;
            border: 1px solid rgba(0,0,0,0.06);
            transition: all 0.2s ease-in-out;
            text-decoration: none !important;
            color: inherit;
            display: block;
        }

        .chat-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(220, 53, 69, 0.08);
            border-color: rgba(220, 53, 69, 0.3);
        }

        .car-icon-box {
            background-color: var(--primary-red);
            color: #ffffff;
            width: 48px;
            height: 48px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* КРАСНЫЙ ИНДИКАТОР НЕПРОЧИТАННЫХ */
        .unread-badge {
            background-color: var(--primary-red);
            color: #ffffff;
            font-size: 0.75rem;
            font-weight: bold;
            padding: 5px 10px;
            border-radius: 20px;
            box-shadow: 0 2px 5px rgba(220, 53, 69, 0.4);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(220, 53, 69, 0.5); }
            70% { box-shadow: 0 0 0 8px rgba(220, 53, 69, 0); }
            100% { box-shadow: 0 0 0 0 rgba(220, 53, 69, 0); }
        }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-9">

            <div class="d-flex justify-content-between align-items-center mb-4">
                <h3 class="page-header fw-bold mb-0">
                    <i class="bi bi-chat-left-text-fill text-danger me-2"></i> Мои сообщения
                </h3>
                <a href="/" class="btn btn-outline-secondary btn-sm rounded-pill px-3">На главную</a>
            </div>

            <div th:if="${#lists.isEmpty(chats)}" class="text-center py-5 bg-white rounded-4 shadow-sm border">
                <i class="bi bi-chat-square-dots text-muted display-3 mb-3 d-block"></i>
                <h5 class="text-secondary">У вас пока нет активных переписок</h5>
                <p class="small text-muted">Вы можете начать чат на странице любого объявления автомобиля.</p>
            </div>

            <div th:unless="${#lists.isEmpty(chats)}" class="d-flex flex-column gap-3">

                <a th:each="chatItem : ${chats}"
                   th:href="@{/chat/{id}(id=${chatItem.listing.id})}"
                   class="chat-card p-3 shadow-sm">

                    <div class="d-flex align-items-center justify-content-between">
                        <div class="d-flex align-items-center gap-3">

                            <div class="car-icon-box">
                                <i class="bi bi-car-front-fill fs-4"></i>
                            </div>

                            <div>
                                <h6 class="mb-1 fw-bold text-dark" th:text="${chatItem.listing.title}">Марка авто</h6>
                                <div class="small text-muted">
                                    <i class="bi bi-person me-1"></i>
                                    Продавец: <span th:text="${chatItem.listing.user.username}">Seller</span>
                                </div>
                            </div>
                        </div>

                        <div class="text-end d-flex align-items-center gap-3">
                            <span class="fw-bold text-danger fs-5"
                                  th:text="${#numbers.formatDecimal(chatItem.listing.price, 0, 'WHITESPACE', 0, 'POINT')} + ' $'">
                                0 $
                            </span>

                            <div th:if="${chatItem.hasUnread}" class="unread-badge">
                                +<span th:text="${chatItem.unreadCount}">1</span> новых
                            </div>
                        </div>

                    </div>
                </a>

            </div>

        </div>
    </div>
</div>

</body>
</html>
