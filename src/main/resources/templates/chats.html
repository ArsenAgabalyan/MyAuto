<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Мои сообщения</title>
    <link rel="stylesheet" href="/style.css">
    <style>
        .container { max-width: 800px; margin: 40px auto; padding: 0 20px; }
        h2 { color: #1e293b; font-size: 24px; font-weight: 700; margin-bottom: 24px; }
        .chats-list { display: flex; flex-direction: column; gap: 16px; }
        .chat-card {
            background: #fff; border: 1px solid #e2e8f0; border-radius: 12px;
            padding: 20px; display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); text-decoration: none; color: inherit;
            transition: transform 0.2s, border-color 0.2s;
        }
        .chat-card:hover { transform: translateY(-2px); border-color: var(--red); }
        .chat-info { display: flex; flex-direction: column; gap: 4px; }
        .chat-title { font-size: 18px; font-weight: 700; color: #1e293b; }
        .chat-user { font-size: 14px; color: #64748b; }
        .btn-open-chat {
            background: var(--red); color: white; border: none; padding: 10px 20px;
            border-radius: 8px; font-size: 14px; font-weight: 600; text-decoration: none;
        }
        .empty-state {
            text-align: center; color: #94a3b8; padding: 60px 20px;
            background: white; border-radius: 12px; border: 1px solid #e2e8f0;
        }
    </style>
</head>
<body>

<nav class="nav">
    <a class="nav-brand" href="/"><span>MY</span>AUTO</a>
    <a href="/" class="btn btn-outline btn-sm">← На главную</a>
</nav>

<div class="container">
    <h2>💬 Мои диалоги</h2>

    <div class="chats-list">
        <div th:if="${#lists.isEmpty(rooms)}" class="empty-state">
            <p style="font-size:18px;margin:0 0 8px 0;font-weight:600;">У вас пока нет сообщений</p>
            <p style="font-size:14px;margin:0;">Когда вам напишут по поводу объявлений или вы напишете кому-то, диалоги появятся здесь.</p>
        </div>

        <a th:each="room : ${rooms}" th:href="@{/chat/{id}(id=${room.id})}" class="chat-card">
            <div class="chat-info">
                <div class="chat-title" th:text="${room.listing.title}">Марка Модель</div>
                <div class="chat-user">
                    💬 Собеседник:
                    <span style="font-weight: 600; color: var(--red);"
                          th:text="${room.buyer.username == currentUsername ? room.seller.username : room.buyer.username}">
                        User
                    </span>
                </div>
            </div>
            <span class="btn-open-chat">Открыть чат →</span>
        </a>
    </div>
</div>

</body>
</html>
