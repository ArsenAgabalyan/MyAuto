<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>MyAuto — Продажа автомобилей</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/tailwind.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">🚗 MYAUTO</a>
        <div class="d-flex align-items-center">
            <span th:if="${param.success}" class="text-warning me-3">★ Объявление отправлено на модерацию!</span>

            <div th:if="${#authentication.name == 'anonymousUser'}">
                <a href="/auth/login" class="btn btn-outline-light me-2">Войти</a>
                <a href="/auth/register" class="btn btn-primary">Регистрация</a>
            </div>

            <div th:if="${#authentication.name != 'anonymousUser'}" class="d-flex align-items-center gap-2">
                <span class="text-light me-2">Привет, <strong th:text="${#authentication.name}">Пользователь</strong>!</span>

                <a href="/listings/add" class="btn btn-success btn-sm">Продать авто</a>

                <a th:if="${#authorization.expression('hasRole(''ADMIN'')')}" href="/admin/moderation" class="btn btn-warning btn-sm">Модерация</a>

                <a href="/auth/logout" class="btn btn-outline-danger btn-sm">Выйти</a>
            </div>
        </div>
    </div>
</nav>

<div class="container my-5">
    <h2 class="mb-4">Актуальные объявления</h2>

    <div th:if="${#lists.isEmpty(cars)}" class="alert alert-info">
        Сейчас нет доступных объявлений. Будьте первым, кто добавит авто!
    </div>

    <div class="row row-cols-1 row-cols-md-3 g-4">
        <div class="col" th:each="car : ${cars}">
            <div class="card h-100 shadow-sm">
                <img src="https://via.placeholder.com/300x200" class="card-img-top" alt="Фото авто">
                <div class="card-body">
                    <h5 class="card-title" th:text="${car.title}">Марка и модель</h5>
                    <p class="card-text text-muted" th:text="${car.description}">Описание автомобиля...</p>
                    <ul class="list-group list-group-flush mb-3">
                        <li class="list-group-item"><strong>Год:</strong> <span th:text="${car.year}">2006</span></li>
                        <li class="list-group-item"><strong>Модель:</strong> <span th:text="${car.carModel}">A4 B7</span></li>
                    </ul>
                    <div class="d-flex justify-content-between align-items-center">
                        <span class="text-success fs-5 fw-bold" th:text="${car.price} + ' $'">0 $</span>
                        <a href="#" class="btn btn-sm btn-outline-secondary">Подробнее</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
